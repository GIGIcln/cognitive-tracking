services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cogtrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gestionale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogtrack"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://cogtrack:${POSTGRES_PASSWORD}@db:5432/gestionale
      SECRET_KEY: ${SECRET_KEY}
      APP_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Nessun volume: il codice è copiato nell'immagine, no hot-reload
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    ports:
      - "127.0.0.1:80:80"  # solo localhost → cloudflared si connette qui
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

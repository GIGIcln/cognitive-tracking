name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql
          echo "PG_CTL=$(find /usr/lib/postgresql -name pg_ctl | sort -V | tail -1)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -r requirements.txt ruff
        working-directory: backend

      - name: Lint (ruff)
        run: ruff check app/
        working-directory: backend

      - name: Run tests
        run: pytest tests/ --postgresql-exec=$PG_CTL -v
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          APP_ENV: test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck (tsc)
        run: npm run typecheck
        working-directory: frontend

      - name: Lint (eslint)
        run: npm run lint
        working-directory: frontend

      - name: Test (vitest)
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npx playwright test
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PostgreSQL 15
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-15

      - name: Install dependencies
        run: pip install -r requirements.txt ruff
        working-directory: backend

      - name: Lint (ruff)
        run: ruff check app/
        working-directory: backend

      - name: Run tests
        run: pytest tests/ --postgresql-exec=/usr/lib/postgresql/15/bin/pg_ctl -v
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          APP_ENV: test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (eslint)
        run: npm run lint
        working-directory: frontend

      - name: Test (vitest)
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
